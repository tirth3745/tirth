<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgroChem ERP - Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css?v=41">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--surface-gradient);
      font-family: 'Space Grotesk', sans-serif;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 40px;
      box-shadow: var(--shadow);
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-logo {
      width: 48px;
      height: 48px;
      background: var(--accent-light);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      color: var(--accent);
      font-size: 24px;
      font-weight: 700;
    }

    .login-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .login-subtitle {
      font-size: 13px;
      color: var(--text-muted);
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg);
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: var(--transition);
    }

    .form-input:focus {
      border-color: var(--accent);
      background: var(--surface);
      box-shadow: 0 0 0 3px var(--accent-light);
    }

    .login-btn {
      width: 100%;
      padding: 12px 16px;
      background: var(--accent);
      color: var(--accent-fg);
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      margin-top: 8px;
    }

    .login-btn:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .error-message {
      background: rgba(220, 38, 38, 0.1);
      border: 1px solid var(--danger);
      color: var(--danger);
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .security-note {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 20px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo">🔐</div>
      <h1 class="login-title">Admin Login</h1>
      <p class="login-subtitle">AgroChem ERP System</p>
    </div>

    <div id="error-message" class="error-message"></div>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-input" type="text" id="username" placeholder="Enter username" required>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="password" placeholder="Enter password" required>
      </div>

      <button type="submit" class="login-btn" id="login-btn">
        <span id="btn-text">Login</span>
      </button>
    </form>

    <div class="security-note">
      <strong>Security Note:</strong> This is a restricted admin area. Unauthorized access attempts may be logged.
    </div>
  </div>
</div>

<script>
async function handleLogin(event) {
  event.preventDefault();

  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  const btn = document.getElementById('login-btn');
  const btnText = document.getElementById('btn-text');
  const errorDiv = document.getElementById('error-message');

  btn.disabled = true;
  btnText.innerHTML = '<span class="spinner"></span>Logging in...';
  errorDiv.classList.remove('show');

  try {
    const response = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });

    const result = await response.json();

    if (result.success) {
      // Login successful
      window.location.href = result.redirect;
    } else {
      // Show error
      errorDiv.textContent = result.message || 'Login failed';
      errorDiv.classList.add('show');
      btn.disabled = false;
      btnText.textContent = 'Login';
    }
  } catch (err) {
    console.error('Login error:', err);
    errorDiv.textContent = 'Connection error. Please try again.';
    errorDiv.classList.add('show');
    btn.disabled = false;
    btnText.textContent = 'Login';
  }
}

// Check if already logged in
fetch('/api/auth/check').then(r => r.json()).then(data => {
  if (data.authenticated) {
    window.location.href = '/pages/dashboard.html';
  }
});
</script>
</body>
</html>
