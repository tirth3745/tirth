<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgroChem ERP — Loading</title>
  <meta name="description" content="AgroChem ERP: Internal Inventory & Business Management for pesticide manufacturing.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:linear-gradient(180deg,#12161D 0%,#0F1318 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
    .wrap{text-align:center;color:#fff;z-index:10;position:relative}
    .logo{width:80px;height:80px;background:var(--accent);background:rgba(137, 233, 0, 0.15);border:2px solid rgba(137, 233, 0, 0.3);border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;animation:pulse 2s infinite;box-shadow: 0 0 25px rgba(137, 233, 0, 0.12);}
    .logo svg{width:40px;height:40px;color:#89E900}
    h1{font-size:32px;font-weight:800;margin-bottom:8px;letter-spacing:-0.02em}
    p{font-size:14px;color:rgba(255,255,255,0.5);margin-bottom:32px}
    .spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,0.1);border-top-color:#89E900;border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 16px;box-shadow: 0 0 15px rgba(137, 233, 0, 0.2)}
    .status{font-size:13px;color:rgba(255,255,255,0.4);letter-spacing:0.02em;font-weight:500}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{box-shadow:0 0 25px rgba(137, 233, 0, 0.12)}50%{box-shadow:0 0 0 20px rgba(137, 233, 0, 0)}}
    .orbs{position:fixed;inset:0;pointer-events:none;overflow:hidden}
    .orb{position:absolute;border-radius:50%;filter:blur(100px);opacity:0.1}
    .orb1{width:400px;height:400px;background:#89E900;top:-100px;left:-100px}
    .orb2{width:300px;height:300px;background:#10B981;bottom:-80px;right:-80px}
  </style>
</head>
<body>
  <div class="orbs"><div class="orb orb1"></div><div class="orb orb2"></div></div>
  <div class="wrap">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
    </div>
    <h1>AgroChem ERP</h1>
    <p>Pesticide Manufacturing & Distribution Management</p>
    <div class="spinner"></div>
    <div class="status">Initialising database…</div>
  </div>
  <script>
    window.location.href = 'pages/dashboard.html';
  </script>
</body>
</html>
